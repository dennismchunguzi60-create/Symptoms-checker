<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Symptom Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Symptom Checker</h1>
    <p class="note">
      This tool is for educational purposes only. It does not give medical diagnosis.
    </p>

    <label>
      <input type="checkbox" id="fever"> Fever
    </label>

    <label>
      <input type="checkbox" id="headache"> Headache
    </label>

    <label>
      <input type="checkbox" id="cough"> Cough
    </label>

    <label>
      <input type="checkbox" id="fatigue"> Fatigue
    </label>

    <button onclick="checkSymptoms()">Check</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
<br><br>
<button onclick="checkSymptoms()">Check Result</button>

<p id="result"></p>

<script src="script.js"></script>
